spring:
  application:
    name: ai-recipe-manager-backend
  profiles:
    default: local
  datasource:
    url: ${DB_URL:}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        # Disable server-side prepared statements — required for Supabase/PgBouncer
        # transaction pooler mode, which cannot share prepared statements across connections.
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

server:
  port: ${PORT:8080}

app:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  cookie:
    secure: true
  jwt:
    secret: ${JWT_SECRET}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
  videoimport:
    ytdlp-path: ${YTDLP_PATH:/usr/local/bin/yt-dlp}
    assemblyai-api-key: ${ASSEMBLYAI_API_KEY}
    gemini-api-key: ${GEMINI_API_KEY}
