spring:
  application:
    name: ai-recipe-manager-backend
  profiles:
    default: local
  datasource:
    url: ${DB_URL:}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

server:
  port: ${PORT:8080}

app:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
